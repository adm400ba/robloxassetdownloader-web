<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Asset Downloader - Download Roblox Assets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        roblox: {
                            dark: '#111216',
                            card: '#1B1C22',
                            border: '#2A2C35'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0d0e12;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.1) 0, transparent 50%);
            background-attachment: fixed;
        }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .progress-stripes {
            background-image: linear-gradient(45deg,rgba(255,255,255,.15) 25%,transparent 25%,transparent 50%,rgba(255,255,255,.15) 50%,rgba(255,255,255,.15) 75%,transparent 75%,transparent);
            background-size: 1rem 1rem;
            animation: stripes 1s linear infinite;
        }
        @keyframes stripes { from { background-position: 1rem 0; } to { background-position: 0 0; } }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col font-sans overflow-x-hidden">
    <nav class="border-b border-roblox-border bg-roblox-dark/80 backdrop-blur-md sticky top-0 z-40">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-3 cursor-pointer">
                    <svg viewBox="0 0 302.7 302.7" class="w-8 h-8">
                      <path fill="#FFFFFF" d="M120.5,271.7c-110.9-28.6-120-31-119.9-31.5 C0.7,239.6,62.1,0.5,62.2,0.4c0,0,54,13.8,119.9,30.8s120,30.8,120.1,30.8 c0.2,0,0.2,0.4,0.1,0.9c-0.2,1.5-61.5,239.3-61.7,239.5 C240.6,302.5,186.5,288.7,120.5,271.7z M174.9,158c3.2-12.6,5.9-23.1,6-23.4c0.1-0.5-2.3-1.2-23.2-6.6 c-12.8-3.3-23.5-5.9-23.6-5.8c-0.3,0.3-12.1,46.6-12,46.7 c0.2,0.2,46.7,12.2,46.8,12.1C168.9,180.9,171.6,170.6,174.9,158L174.9,158z"/>
                    </svg>
                    <span class="font-bold text-xl tracking-tight">Roblox Asset <span class="text-blue-500">Downloader</span></span>
                </div>
            </div>
        </div>
    </nav>
    <main class="flex-grow flex flex-col items-center justify-center px-4 py-12">
        <div class="text-center max-w-3xl mx-auto mb-10 animate-fade-in">
            <h1 class="text-4xl sm:text-5xl font-bold tracking-tight mb-4">
                Download <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">Roblox Assets</span>
            </h1>
            <p class="text-gray-400 text-lg max-w-2xl mx-auto">
                Enter the Asset ID (use commas for multiple Asset IDs).
            </p>
        </div>
        <div class="w-full max-w-2xl mx-auto bg-roblox-card border border-roblox-border rounded-2xl shadow-2xl p-6 sm:p-8 relative overflow-hidden animate-fade-in">
            <form id="download-form" class="relative z-10" onsubmit="event.preventDefault(); startDownload();">
                <label for="asset-id" class="block text-sm font-medium text-gray-300 mb-2">Asset ID(s)</label>
                <div class="flex flex-col gap-4">
                    <div class="relative flex-grow">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="hash" class="w-5 h-5 text-gray-500"></i>
                        </div>
                        <input type="text" id="asset-id" required class="block w-full pl-10 pr-4 py-3 bg-[#0a0a0c] border border-roblox-border rounded-xl text-white placeholder-gray-500 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="142376088, 1841443579">
                    </div>
                    <button type="submit" id="search-btn" class="w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3.5 rounded-xl transition-all disabled:opacity-50">
                        <i data-lucide="download" id="btn-icon" class="w-5 h-5"></i>
                        <span id="btn-text">Download Asset(s)</span>
                    </button>
                </div>
            </form>

            <div id="progress-area" class="mt-8 hidden animate-fade-in">
                <div class="flex justify-between text-sm mb-2">
                    <span id="status-text" class="text-blue-400 font-medium">Starting...</span>
                    <span id="percentage-text" class="text-gray-400">0%</span>
                </div>
                <div class="w-full bg-roblox-border rounded-full h-3 overflow-hidden border border-white/5">
                    <div id="progress-bar" class="bg-blue-500 h-3 rounded-full progress-stripes transition-all duration-300 ease-out" style="width: 0%"></div>
                </div>
                <button onclick="cancelTask()" class="mt-5 w-full flex items-center justify-center gap-2 bg-red-600 hover:bg-red-700 text-white font-semibold py-2.5 rounded-xl transition-all">
                    Cancel
                </button>
            </div>

            <div id="options-area" class="mt-8 pt-6 border-t border-roblox-border hidden animate-fade-in">
                <h3 class="text-lg font-bold text-white mb-4">Select Formats and Qualities</h3>
                <div id="audio-options" class="mb-4 hidden">
                    <h4 class="text-sm text-gray-300 mb-2 font-medium">Audio Detected</h4>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <select id="audio-format" class="w-full bg-[#0a0a0c] border border-roblox-border rounded-lg p-2 text-sm text-gray-200 outline-none focus:border-blue-500">
                                <option value=".ogg">.OGG (Original)</option>
                                <option value=".mp3">.MP3</option>
                                <option value=".wav">.WAV</option>
                                <option value=".flac">.FLAC</option>
                            </select>
                        </div>
                        <div>
                            <select id="audio-quality" class="w-full bg-[#0a0a0c] border border-roblox-border rounded-lg p-2 text-sm text-gray-200 outline-none focus:border-blue-500">
                                <option value="original">Original Quality</option>
                                <option value="high">High (320kbps)</option>
                                <option value="medium">Medium (192kbps)</option>
                                <option value="low">Low (128kbps)</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div id="video-options" class="mb-6 hidden">
                    <h4 class="text-sm text-gray-300 mb-2 font-medium">Video Detected</h4>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <select id="video-format" class="w-full bg-[#0a0a0c] border border-roblox-border rounded-lg p-2 text-sm text-gray-200 outline-none focus:border-blue-500">
                                <option value=".webm">.WEBM (Original)</option>
                                <option value=".mp4">.MP4</option>
                                <option value=".mov">.MOV</option>
                            </select>
                        </div>
                        <div>
                            <select id="video-quality" class="w-full bg-[#0a0a0c] border border-roblox-border rounded-lg p-2 text-sm text-gray-200 outline-none focus:border-blue-500">
                                <option value="original">Original Resolution</option>
                                <option value="1080p">1080p</option>
                                <option value="720p">720p</option>
                                <option value="480p">480p</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <div class="flex gap-4">
                    <button onclick="cancelTask()" class="w-1/3 flex items-center justify-center gap-2 bg-red-600 hover:bg-red-700 text-white font-semibold py-3 rounded-xl transition-all">
                        Cancel
                    </button>
                    <button onclick="submitOptions()" class="w-2/3 flex items-center justify-center gap-2 bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-xl transition-all">
                        Confirm Conversion
                    </button>
                </div>
            </div>
            
            <div id="result-area" class="mt-8 pt-6 border-t border-roblox-border hidden animate-fade-in">
                <div class="relative flex flex-col items-center gap-4 bg-green-500/10 border border-green-500/20 p-6 rounded-xl text-center w-full">
                    <button onclick="document.getElementById('result-area').classList.add('hidden')" class="absolute top-3 right-3 text-green-400 hover:text-white transition-colors">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                    <div class="w-12 h-12 bg-green-500/20 text-green-400 rounded-full flex items-center justify-center mb-2">
                        <i data-lucide="check" class="w-6 h-6"></i>
                    </div>
                    <div class="w-full">
                        <h3 class="text-lg font-bold text-white mb-1">Process Completed!</h3>
                        <p id="result-filename" class="text-sm text-gray-400 mb-4 break-all"></p>
                    </div>
                    <a id="download-link" href="#" target="_blank" class="bg-green-600 hover:bg-green-700 text-white font-medium py-2.5 px-6 rounded-lg transition-colors inline-flex items-center gap-2">
                        <i data-lucide="download" class="w-4 h-4"></i> Download File
                    </a>
                </div>
            </div>
            
            <div id="error-area" class="mt-8 hidden animate-fade-in">
                <div class="flex items-center gap-3 bg-red-500/10 border border-red-500/20 text-red-400 p-4 rounded-xl">
                    <i data-lucide="alert-triangle" class="w-5 h-5 shrink-0"></i>
                    <p id="error-text" class="text-sm font-medium"></p>
                </div>
            </div>
        </div>
    </main>
    <script>
        lucide.createIcons();
        let pollInterval;
        let currentTaskId = null;

        async function startDownload() {
            const assetIds = document.getElementById('asset-id').value.trim();
            if (!assetIds) return;
            document.getElementById('result-area').classList.add('hidden');
            document.getElementById('error-area').classList.add('hidden');
            document.getElementById('options-area').classList.add('hidden');
            document.getElementById('progress-area').classList.remove('hidden');
            document.getElementById('search-btn').disabled = true;
            document.getElementById('btn-text').textContent = "Processing...";
            updateProgressBar(5, "Initializing request...");

            try {
                const response = await fetch('/api/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ asset_ids: assetIds })
                });
                const data = await response.json();
                if (data.error) {
                    showError(data.error);
                    return;
                }
                currentTaskId = data.task_id;
                pollInterval = setInterval(() => checkStatus(currentTaskId), 1500);
            } catch (error) {
                showError("Error connecting to server.");
            }
        }

        async function checkStatus(taskId) {
            try {
                const response = await fetch(`/api/status/${taskId}`);
                const data = await response.json();
                updateProgressBar(data.progress, data.message);

                if (data.status === 'needs_input') {
                    clearInterval(pollInterval);
                    showOptions(data.has_audio, data.has_video);
                } else if (data.status === 'completed') {
                    clearInterval(pollInterval);
                    showSuccess(data.result);
                } else if (data.status === 'error') {
                    clearInterval(pollInterval);
                    showError(data.message);
                } else if (data.status === 'canceled') {
                    clearInterval(pollInterval);
                    showError("Task canceled.");
                }
            } catch (error) {}
        }

        function showOptions(hasAudio, hasVideo) {
            document.getElementById('progress-area').classList.add('hidden');
            document.getElementById('options-area').classList.remove('hidden');
            if (hasAudio) document.getElementById('audio-options').classList.remove('hidden');
            else document.getElementById('audio-options').classList.add('hidden');
            if (hasVideo) document.getElementById('video-options').classList.remove('hidden');
            else document.getElementById('video-options').classList.add('hidden');
        }

        async function submitOptions() {
            const req = {
                audio_fmt: document.getElementById('audio-format').value || "",
                audio_qual: document.getElementById('audio-quality').value || "",
                video_fmt: document.getElementById('video-format').value || "",
                video_qual: document.getElementById('video-quality').value || ""
            };
            document.getElementById('options-area').classList.add('hidden');
            document.getElementById('progress-area').classList.remove('hidden');
            try {
                await fetch(`/api/options/${currentTaskId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(req)
                });
                pollInterval = setInterval(() => checkStatus(currentTaskId), 1500);
            } catch (err) {
                showError("Error submitting options.");
            }
        }

        async function cancelTask() {
            if (currentTaskId) {
                try {
                    await fetch(`/api/cancel/${currentTaskId}`, { method: 'POST' });
                } catch (e) {
                    console.error("Failed to reach cancel endpoint", e);
                }
            }
            clearInterval(pollInterval);
            document.getElementById('options-area').classList.add('hidden');
            showError("Task canceled by user.");
        }

        function updateProgressBar(percentage, message) {
            document.getElementById('progress-bar').style.width = `${percentage}%`;
            document.getElementById('percentage-text').textContent = `${percentage}%`;
            document.getElementById('status-text').textContent = message;
        }

        function showSuccess(resultData) {
            document.getElementById('progress-area').classList.add('hidden');
            document.getElementById('result-area').classList.remove('hidden');
            document.getElementById('result-filename').textContent = resultData.filename;
            document.getElementById('download-link').href = resultData.url;
            resetButton();
            lucide.createIcons();
        }

        function showError(message) {
            document.getElementById('progress-area').classList.add('hidden');
            document.getElementById('error-area').classList.remove('hidden');
            document.getElementById('error-text').textContent = message;
            resetButton();
        }

        function resetButton() {
            document.getElementById('search-btn').disabled = false;
            document.getElementById('btn-text').textContent = "Download Asset(s)";
        }
    </script>
</body>
</html>
